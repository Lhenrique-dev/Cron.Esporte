<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="shortcut icon"
      href="./image/cronometro.png"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Cronômetro Simples</title>
    <style>
      body {
        background-image: url(./image/2752966-abstract-futuristic-technology-background-with-digital-number-timer-concept-and-countdown-vetor.jpg);
        background-size: cover;
        font-family: "Poppins", sans-serif;
        text-align: center;
        margin-top: 50px;
        background-color: rgb(190, 209, 206);
      }
      #display {
        font-size: 48px;
        margin-bottom: 20px;
      }
      button {
        font-size: 16px;
        background: black;
        color: white;
        box-shadow:
          rgba(0, 0, 0, 0.25) 0px 54px 55px,
          rgba(0, 0, 0, 0.12) 0px -12px 30px,
          rgba(0, 0, 0, 0.12) 0px 4px 6px,
          rgba(0, 0, 0, 0.17) 0px 12px 13px,
          rgba(0, 0, 0, 0.09) 0px -3px 5px;
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="display">00:00</div>
    <button id="startBtn">Iniciar</button>
    <button id="pauseBtn">Pausar</button>
    <button id="resetBtn">Resetar</button>

    <script src="script.js"></script>
  </body>
</html>
